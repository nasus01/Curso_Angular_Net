<h4>{{titulo}}</h4>

<div>
    <button type="button" mat-raised-button (click)="CargadorArchivo.click()">Selecionar imagen</button>
    <input type="file" hidden #CargadorArchivo accept="imagen/*" (change)="cambio($event)" />
</div>
<div>
    @if (imagenBase64){
        <img [src]="imagenBase64" width="169" height="250"/>
    }@else if (urlImagenActual) {
        <img [src]="urlImagenActual" width="169" height="250"/>
    }
</div>
